name: 🧪 测试 SSH 配置同步流程 (Test SSH Config Sync)

on:
  workflow_dispatch:
    inputs:
      test_config_content:
        description: "模拟 SSH 修改后的 .config 内容 (Mock SSH-modified .config content)"
        type: string
        required: true
        default: |
          CONFIG_TARGET_x86_64=y
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_curl=y

jobs:
  test-ssh-config-sync:
    runs-on: ubuntu-latest
    name: 🧪 测试 SSH 配置同步
    steps:
      - name: 克隆当前仓库 (Clone current repo)
        uses: actions/checkout@v4

      - name: 模拟 SSH 修改后的 .config (Simulate SSH-modified .config)
        run: |
          echo "=== 模拟 SSH 会话后生成的 .config ==="
          mkdir -p openWRT
          cat > openWRT/.config << 'EOFCONFIG'
${{ inputs.test_config_content }}
EOFCONFIG
          echo "openWRT/.config 内容："
          cat openWRT/.config
          echo "=== END ==="

      - name: 模拟 SSH 配置后上传配置 (Simulate SSH config upload)
        run: |
          echo "模拟上传 SSH 生成的配置到 Artifact..."

      - name: 将 SSH 修改后的 .config 复制回仓库根目录 (Copy modified .config back to repo root)
        run: |
          echo "复制 openWRT/.config 到仓库根目录..."
          cp -f openWRT/.config .config
          echo ".config 内容验证："
          cat .config

      - name: 显示 git 状态 (Show git status)
        run: |
          echo "=== Git 状态 ==="
          git status
          git diff .config || true

      - name: 提交并推送 .config 到 GitHub 仓库 (Commit and push .config to GitHub)
        run: |
          echo "=== 提交并推送 .config ==="
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

          git add .config

          if git diff --cached --quiet; then
            echo "没有变更需要提交（.config 未变化）"
          else
            echo "有变更，准备提交..."
            git commit -m "Update .config via SSH (test)"
            echo "推送到 GitHub..."
            git push "https://${{github.actor}}:${{secrets.GITHUB_TOKEN}}@github.com/${{github.repository}}.git" HEAD:${{github.ref}}
            echo "✅ 推送成功！"
          fi

      - name: 验证最终状态 (Verify final state)
        run: |
          echo "=== 验证最终状态 ==="
          echo "仓库根目录 .config："
          cat .config
          echo ""
          echo "openWRT/.config："
          cat openWRT/.config
          echo ""
          echo "Git log 最近 3 条："
          git log --oneline -3
